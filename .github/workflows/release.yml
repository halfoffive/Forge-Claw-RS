name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: false
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            use-cross: false
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'web/pnpm-lock.yaml'

      - name: Build frontend
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --bin forgeclaw-cli --target ${{ matrix.target }}
          else
            cargo build --release --bin forgeclaw-cli --target ${{ matrix.target }}
          fi

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar czf forgeclaw-cli-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release forgeclaw-cli
          shasum -a 256 forgeclaw-cli-${{ matrix.target }}.tar.gz > forgeclaw-cli-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/forgeclaw-cli.exe -DestinationPath forgeclaw-cli-${{ matrix.target }}.zip
          $hash = (Get-FileHash forgeclaw-cli-${{ matrix.target }}.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  forgeclaw-cli-${{ matrix.target }}.zip" | Out-File -Encoding ascii forgeclaw-cli-${{ matrix.target }}.zip.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            forgeclaw-cli-${{ matrix.target }}.tar.gz
            forgeclaw-cli-${{ matrix.target }}.tar.gz.sha256
            forgeclaw-cli-${{ matrix.target }}.zip
            forgeclaw-cli-${{ matrix.target }}.zip.sha256
